<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#c9a227"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Modo Águila"/>
  <title>Calendario — Modo Águila</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
</head>
<body>

<nav class="topnav">
  <div class="topnav-brand"><span class="brandico">🦅</span>MODO ÁGUILA</div>
  <div class="topnav-links">
    <a href="index.html"      class="topnav-link">Hoy</a>
    <a href="calendario.html" class="topnav-link active">Cal</a>
  </div>
</nav>

<main class="cal-wrap">

  <div class="view-tabs">
    <button class="vtab on" id="vMes"    onclick="setView('mes')">📅 Mes</button>
    <button class="vtab"    id="vSemana" onclick="setView('semana')">📆 Semana</button>
    <button class="vtab"    id="vHoy"    onclick="goToday()">📌 Hoy</button>
  </div>

  <!-- Vista Mes -->
  <div id="mesView">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="prevMonth()">‹</button>
      <div class="cal-title" id="calTitle">—</div>
      <button class="cal-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-days-hdr">
      <div class="cal-day-hdr">L</div><div class="cal-day-hdr">M</div>
      <div class="cal-day-hdr">X</div><div class="cal-day-hdr">J</div>
      <div class="cal-day-hdr">V</div><div class="cal-day-hdr">S</div>
      <div class="cal-day-hdr">D</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Vista Semana -->
  <div id="semanaView" class="hidden">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="prevWeek()">‹</button>
      <div class="cal-title" id="semTitle">—</div>
      <button class="cal-nav-btn" onclick="nextWeek()">›</button>
    </div>
    <div id="semGrid"></div>
  </div>

  <!-- Panel día seleccionado -->
  <div class="day-panel hidden" id="dayPanel">
    <div class="day-panel-title" id="dayPanelTitle">—</div>
    <div id="dayEvList"></div>
    <div class="sec mt12" style="margin-top:14px;margin-bottom:10px">
      <div class="sec-ico" style="width:28px;height:28px;font-size:.8rem">➕</div>
      <div class="sec-title" style="font-size:.72rem">Agregar evento</div>
    </div>
    <div class="row">
      <input type="time" class="field field-time" id="evTime"/>
      <input type="text" class="field" id="evText" placeholder="Descripción..." maxlength="120"/>
      <button class="btn btn-gold btn-sq" onclick="addCalEv()">+</button>
    </div>
  </div>

</main>

<nav class="botnav">
  <a href="index.html"        class="botnav-item">
    <span class="botnav-ico">🦅</span><span class="botnav-lbl">Estado</span>
  </a>
  <a href="index.html#agenda" class="botnav-item">
    <span class="botnav-ico">⏰</span><span class="botnav-lbl">Agenda</span>
  </a>
  <a href="calendario.html"   class="botnav-item on">
    <span class="botnav-ico">📅</span><span class="botnav-lbl">Cal</span>
  </a>
  <a href="index.html#focosec" class="botnav-item">
    <span class="botnav-ico">🔥</span><span class="botnav-lbl">Foco</span>
  </a>
</nav>

<div class="toasts" id="toasts"></div>
<script src="calendario.js"></script>
</body>
</html>
