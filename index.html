<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🦅 Aguila OS</h1>

  <div class="nav-dias">
    <button onclick="diaAnterior()">◀</button>
    <span id="fechaTexto"></span>
    <button onclick="diaSiguiente()">▶</button>
  </div>

  <div id="estado"></div>
</header>

<!-- 🔥 MISIÓN -->
<section class="card bestia">
  <h2>🔥 MISION ACTIVA</h2>
  <p id="misionActual"></p>
  <button id="btnCompletar">COMPLETAR</button>
</section>

<!-- 📊 PROGRESO -->
<section class="card">
  <h2>📊 Progreso</h2>
  <div class="progress"><div id="barraPro"></div></div>
  <h3 id="porcentaje">0%</h3>
</section>

<!-- 📅 CALENDARIO -->
<section class="card">
  <h2>📅 Calendario</h2>

  <div class="calendar-header">
    <button onclick="prevMes()">◀</button>
    <h3 id="mesTitulo"></h3>
    <button onclick="nextMes()">▶</button>
  </div>

  <div id="calendarGrid"></div>
</section>

<!-- ⏰ EVENTOS -->
<section class="card">
  <h2>⏰ Agenda</h2>
  <input type="date" id="fechaEvento">
  <input type="time" id="horaEvento">
  <input type="text" id="textoEvento" placeholder="Ej: Trabajar">
  <button onclick="addEvento()">Agregar</button>
  <ul id="agendaDia"></ul>
</section>

<!-- 📌 PENDIENTES -->
<section class="card">
  <h2>📌 Pendientes</h2>
  <input id="pendienteTexto" placeholder="Ej: Llamar cliente">
  <button id="btnPendiente">Agregar</button>
  <ul id="listaPendientes"></ul>
</section>

<!-- 🧠 TRABAJO -->
<section class="card">
  <h2>🧠 Trabajo</h2>
  <div id="checks"></div>
</section>

<!-- 💧 AGUA -->
<section class="card">
  <h2>💧 Agua</h2>
  <div class="progress"><div id="barraAgua"></div></div>
  <p id="agua">0 ml</p>
  <button id="btnAgua">+250 ml</button>
</section>

<!-- 🧠 DISCIPLINA -->
<section class="card">
  <h2>🧠 Disciplina</h2>
  <label><input type="checkbox" data-disc="resp"> Respiración</label><br>
  <label><input type="checkbox" data-disc="calistenia"> Calistenia</label><br>
  <label><input type="checkbox" data-disc="baño"> Baño caliente</label>
</section>

<!-- 📖 BIBLIA -->
<section class="card">
  <h2>📖 Estudio Bíblico</h2>
  <p id="versiculo"></p>

  <textarea id="obs" placeholder="Observación"></textarea>
  <textarea id="interp" placeholder="Interpretación"></textarea>
  <textarea id="contexto" placeholder="Contexto"></textarea>
  <textarea id="aplicacion" placeholder="Aplicación"></textarea>
  <textarea id="reflexion" placeholder="Reflexión"></textarea>

  <button onclick="guardarBiblia()">Guardar</button>
</section>

<script src="app.js"></script>
</body>
</html>
