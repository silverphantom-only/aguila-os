<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: #111a2b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, textarea, button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

ul {
  padding: 0;
  list-style: none;
}

li {
  background: #0f172a;
  margin-top: 8px;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}
</style>

</head>

<body>

<div class="container">

<h1>🦅 Águila OS</h1>

<!-- 📅 FECHA -->
<div class="card">
  <h2>📅 Día activo</h2>
  <input type="date" id="fecha">
</div>

<!-- 📌 EVENTOS -->
<div class="card">
  <h2>📌 Eventos</h2>

  <input type="time" id="hora">
  <input type="text" id="evento" placeholder="Descripción del evento">

  <button onclick="agregarEvento()">Agregar</button>

  <ul id="listaEventos"></ul>
</div>

<!-- ✅ CHECKLIST -->
<div class="card">
  <h2>✅ Checklist</h2>

  <label><input type="checkbox" onchange="toggleCheck('respiracion')"> Respiración</label><br>
  <label><input type="checkbox" onchange="toggleCheck('ejercicio')"> Ejercicio</label><br>
  <label><input type="checkbox" onchange="toggleCheck('agua')"> Tomar agua</label>
</div>

<!-- 📌 PENDIENTES -->
<div class="card">
  <h2>📌 Pendientes</h2>

  <input type="text" id="pendiente" placeholder="Nuevo pendiente">
  <button onclick="agregarPendiente()">Agregar</button>

  <ul id="listaPendientes"></ul>
</div>

<!-- 💧 AGUA -->
<div class="card">
  <h2>💧 Agua</h2>

  <p id="aguaTotal">0 ml</p>

  <button onclick="sumarAgua()">+250 ml</button>
</div>

<!-- 📖 ESTUDIO BÍBLICO -->
<div class="card">
  <h2>📖 Estudio Bíblico</h2>

  <input type="text" id="pasaje" placeholder="Pasaje (ej: Juan 3)">
  <textarea id="nota" placeholder="Reflexión"></textarea>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
