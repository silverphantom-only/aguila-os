<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🦅 Aguila OS</h1>

<!-- SEMANA -->
<div class="card">
  <h2>📆 Semana</h2>
  <div id="semana"></div>
</div>

<!-- DÍA -->
<div class="card">
  <h2>📍 Día</h2>
  <p id="fechaTexto"></p>
  <div id="hoy"></div>
</div>

<!-- DISCIPLINA -->
<div class="card">
  <h2>🔥 Disciplina</h2>
  <p>Racha: <span id="streak">0</span></p>
</div>

<!-- MENSAJE -->
<div class="card">
  <h2>🧠 Tonatiuh</h2>
  <p id="mensaje"></p>
</div>

<!-- ESTADO -->
<div class="card">
  <h2>📊 Estado</h2>
  <img id="estadoImg" src="balgham.png">
  <p id="estadoTexto"></p>
</div>

<!-- CHECKLIST -->
<div class="card">
  <h2>✔️ Checklist Diario</h2>

  <label><input type="checkbox" data-check="resp"> Respiración</label>
  <label><input type="checkbox" data-check="entreno"> Entrenamiento</label>
  <label><input type="checkbox" data-check="des"> Desayuno</label>

  <label><input type="checkbox" data-check="wa"> WhatsApp</label>
  <label><input type="checkbox" data-check="gm"> Gmail</label>
  <label><input type="checkbox" data-check="res"> Reservas</label>
  <label><input type="checkbox" data-check="gas"> Gasolina</label>
  <label><input type="checkbox" data-check="cier"> Cierre</label>
  <label><input type="checkbox" data-check="ctrl"> Control</label>
</div>

<!-- EVENTOS -->
<div class="card">
  <h2>➕ Agendar Evento</h2>
  <input type="date" id="fecha">
  <input type="time" id="hora">
  <input type="text" id="evento" placeholder="Ej: Dentista">
  <button onclick="agregarEvento()">Agregar</button>
</div>

<!-- AGUA -->
<div class="card">
  <h2>💧 Agua</h2>
  <p id="agua">0 ml</p>
  <button onclick="agregarAgua()">+250 ml</button>
</div>

<!-- GASTOS -->
<div class="card">
  <h2>💰 Gastos</h2>
  <input id="monto" placeholder="Monto">
  <input id="categoria" placeholder="Categoría">
  <button onclick="addGasto()">Agregar</button>
  <ul id="listaGastos"></ul>
  <p>Total: $<span id="total">0</span></p>
</div>

<script src="app.js"></script>

</body>
</html>
