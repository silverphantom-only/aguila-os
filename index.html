<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111a2b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

/* LISTA */
ul {
  list-style: none;
  padding: 0;
}

li {
  background: #0f172a;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* CHECK */
.item {
  display: flex;
  align-items: center;
  gap: 10px;
}

.done {
  text-decoration: line-through;
  opacity: 0.6;
}

/* PROGRESO */
.progress {
  height: 20px;
  background: #1e293b;
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
}
</style>

</head>

<body>

<div class="container">

<h1>🦅 Águila OS</h1>

<!-- 📅 FECHA -->
<div class="card">
  <h2>📅 Día</h2>
  <input type="date" id="fecha">
</div>

<!-- 📊 PROGRESO -->
<div class="card">
  <h2>📊 Progreso</h2>
  <div class="progress">
    <div class="bar" id="barra"></div>
  </div>
  <p id="porcentaje">0%</p>
</div>

<!-- 📌 EVENTOS -->
<div class="card">
  <h2>📌 Eventos</h2>

  <input type="time" id="hora">
  <input type="text" id="evento" placeholder="Evento">

  <button onclick="agregarEvento()">Agregar</button>

  <ul id="listaEventos"></ul>
</div>

<!-- 🧠 TRABAJO (CHECKLIST REAL) -->
<div class="card">
  <h2>🧠 Trabajo</h2>

  <label><input type="checkbox" onchange="toggleCheck('whatsapp')"> WhatsApp</label><br>
  <label><input type="checkbox" onchange="toggleCheck('gmail')"> Gmail</label><br>
  <label><input type="checkbox" onchange="toggleCheck('reservas')"> Reservas</label><br>
  <label><input type="checkbox" onchange="toggleCheck('gasolina')"> Gasolina</label><br>
  <label><input type="checkbox" onchange="toggleCheck('cierre')"> Cierre</label><br>
  <label><input type="checkbox" onchange="toggleCheck('control')"> Control</label>
</div>

<!-- 📌 PENDIENTES (CON CHECK) -->
<div class="card">
  <h2>📌 Pendientes</h2>

  <input type="text" id="pendiente" placeholder="Nuevo pendiente">
  <button onclick="agregarPendiente()">Agregar</button>

  <ul id="listaPendientes"></ul>
</div>

<!-- 💧 AGUA -->
<div class="card">
  <h2>💧 Agua</h2>
  <p id="aguaTotal">0 ml</p>
  <button onclick="sumarAgua()">+250 ml</button>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
