<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Águila</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#0f1115">
</head>
<body>

<div class="app">

<header>
<button id="prevMonth">◀</button>
<h2 id="month"></h2>
<button id="nextMonth">▶</button>
</header>

<div id="calendar"></div>

<div class="card">
<h3 id="selectedDate"></h3>

<div id="agenda"></div>

<input type="time" id="time">
<input type="text" id="taskText" placeholder="Nueva tarea">
<button id="addTask">Agregar</button>
</div>

<div class="card">
<h3>Pendientes</h3>

<div id="pendientes"></div>

<input type="text" id="pendienteTexto" placeholder="Nuevo pendiente">
<button id="addPendiente">Agregar</button>
</div>

<div class="card">
<h3>Progreso</h3>
<div class="progress"><div id="bar"></div></div>
<p id="estado"></p>
</div>

<button id="quick">+</button>

</div>

<script src="app.js"></script>
</body>
</html>
