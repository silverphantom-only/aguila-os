<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguila OS</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#020617">
</head>

<body>

<h1>🦅 Aguila OS</h1>

<div class="card">
<h2>📍 Hoy</h2>
<p id="hoy"></p>
</div>

<div class="card">
<h2>🧠 Tonatiuh</h2>
<p id="mensaje"></p>
</div>

<div class="card">
<h2>📊 Estado</h2>
<img id="estadoImg" src="balgham.png">
<p id="estadoTexto"></p>

<button onclick="musica()" class="btn-green">🎧 Música</button>
<button onclick="iniciarRutina()" class="btn-orange">🔥 Entrenar</button>

<p id="ejercicio"></p>
<div id="timer"></div>
</div>

<div class="card">
<h2>✔️ Checklist</h2>

<label><input type="checkbox" data-check="resp"> Respiración</label>
<label><input type="checkbox" data-check="cal"> Calistenia</label>
<label><input type="checkbox" data-check="des"> Desayuno</label>

<label><input type="checkbox" data-check="wa"> WhatsApp</label>
<label><input type="checkbox" data-check="gm"> Gmail</label>
<label><input type="checkbox" data-check="res"> Reservas</label>
<label><input type="checkbox" data-check="gas"> Gasolina</label>
<label><input type="checkbox" data-check="cier"> Cierre</label>
<label><input type="checkbox" data-check="ctrl"> Control</label>
</div>

<div class="card">
<h2>📅 Agenda</h2>
<input type="date" id="fecha">
<input type="time" id="hora">
<input type="text" id="evento" placeholder="Evento">
<button onclick="agregarEvento()">Agregar</button>
<ul id="listaEventos"></ul>
</div>

<div class="card">
<h2>💧 Agua</h2>
<p id="agua">0 ml</p>
<button onclick="agregarAgua()">+250 ml</button>
</div>

<div class="card">
<h2>🕒 Horario Trabajo</h2>
<input id="inicio" placeholder="Inicio (9)">
<input id="fin" placeholder="Fin (14)">
<button onclick="setHorario()">Guardar</button>
</div>

<div class="card">
<h2>💰 Gastos</h2>
<input id="monto" placeholder="Monto">
<input id="categoria" placeholder="Categoría">
<button onclick="addGasto()">Agregar</button>
<ul id="listaGastos"></ul>
<p>Total: $<span id="total"></span></p>
</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
