<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">
    <h1>🦅 Águila OS</h1>
    <span id="streak">🔥 0</span>
  </div>

  <div class="grid">
    <div class="card" onclick="goTo('app')">📆<p>Mi Día</p></div>
    <div class="card" onclick="goTo('app')">📌<p>Pendientes</p></div>
    <div class="card" onclick="goTo('app')">🧘<p>Hábitos</p></div>
    <div class="card" onclick="goTo('app')">📊<p>Progreso</p></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="screen">

  <div class="topbar">
    <button onclick="goTo('home')">←</button>
    <h2 id="mesTitulo"></h2>
  </div>

  <input type="date" id="fecha">

  <div id="calendar"></div>

  <!-- PROGRESO -->
  <div class="progressCard">
    <div class="progressBar">
      <div id="barra"></div>
    </div>
    <p id="porcentaje">0%</p>
  </div>

  <!-- PENDIENTES -->
  <section>
    <h3>📌 Pendientes</h3>
    <input id="inputPendiente" placeholder="Nueva tarea...">
    <button onclick="addTask()">Agregar</button>
    <ul id="lista"></ul>
  </section>

  <!-- HABITOS -->
  <section>
    <h3>🧘 Hábitos</h3>
    <div id="habitosList"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
