<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🦅 Águila OS</h1>

<!-- 📅 FECHA -->
<div class="card">
  <h2>📅 Día activo</h2>
  <input type="date" id="fecha">
</div>

<!-- 📌 EVENTOS -->
<div class="card">
  <h2>📌 Eventos</h2>

  <input type="time" id="hora">
  <input type="text" id="evento" placeholder="Descripción...">
  <button onclick="agregarEvento()">Agregar</button>

  <ul id="listaEventos"></ul>
</div>

<!-- ✅ CHECKLIST -->
<div class="card">
  <h2>✅ Checklist</h2>

  <label><input type="checkbox" onchange="toggleCheck('respiracion')"> Respiración</label><br>
  <label><input type="checkbox" onchange="toggleCheck('ejercicio')"> Ejercicio</label><br>
  <label><input type="checkbox" onchange="toggleCheck('agua')"> Agua</label>
</div>

<!-- 📌 PENDIENTES -->
<div class="card">
  <h2>📌 Pendientes</h2>

  <input type="text" id="pendiente" placeholder="Nuevo pendiente">
  <button onclick="agregarPendiente()">Agregar</button>

  <ul id="listaPendientes"></ul>
</div>

<!-- 💧 AGUA -->
<div class="card">
  <h2>💧 Agua</h2>
  <p id="aguaTotal">0 ml</p>
  <button onclick="sumarAgua()">+250 ml</button>
</div>

<!-- 📖 BIBLIA -->
<div class="card">
  <h2>📖 Estudio Bíblico</h2>

  <input type="text" id="pasaje" placeholder="Pasaje"><br>
  <textarea id="nota" placeholder="Reflexión"></textarea>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
