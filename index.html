<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="panel">

  <h1>🦅 Águila OS</h1>

  <div class="top">
    <input type="date" id="fecha">
    <div id="racha">🔥 0</div>
    <div id="nivel">🧬 Balgham</div>
  </div>

  <div class="progress">
    <div id="barra"></div>
  </div>
  <p id="porcentaje">0%</p>

</div>

<section>
  <h2>🧠 Trabajo</h2>
  <div id="trabajo"></div>
</section>

<section>
  <h2>💪 Disciplina Física</h2>
  <div id="fisico"></div>
</section>

<section>
  <h2>❤️ Vida</h2>
  <div id="vida"></div>
</section>

<section>
  <h2>📖 Bitácora</h2>
  <input id="biblia" placeholder="Pasaje">
  <textarea id="nota" placeholder="Reflexión"></textarea>
  <button onclick="guardarNotas()">Guardar</button>
</section>

<script src="app.js"></script>
</body>
</html>
