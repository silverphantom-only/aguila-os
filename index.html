<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Águila OS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <span class="logo-icon">🦅</span>
      <span class="logo-text">ÁGUILA OS</span>
    </div>
    <div class="header-right">
      <div class="eagle-state" id="eagleState">
        <span class="state-icon" id="stateIcon">🥚</span>
        <span class="state-label" id="stateLabel">Inicio</span>
      </div>
      <div class="streak-badge">
        <span class="streak-fire">🔥</span>
        <span class="streak-count" id="streakCount">0</span>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- CALENDARIO SEMANAL -->
    <section class="card calendar-card">
      <h2 class="card-title">📆 Semana</h2>
      <div class="week-grid" id="weekGrid"></div>
    </section>

    <!-- VISTA DEL DÍA -->
    <section class="card day-card">
      <div class="day-header">
        <div>
          <div class="day-name" id="dayName">—</div>
          <div class="day-full-date" id="dayFullDate">—</div>
        </div>
        <button class="streak-btn" id="streakBtn" onclick="registerStreak()">
          ✅ Marcar día
        </button>
      </div>
    </section>

    <!-- EVENTOS -->
    <section class="card events-card">
      <h2 class="card-title">🗂 Eventos del día</h2>
      <div class="event-form">
        <input type="date" id="eventDate" class="input" />
        <input type="time" id="eventTime" class="input" />
        <input type="text" id="eventText" class="input event-text-input" placeholder="Descripción del evento…" />
        <button class="btn btn-green event-add-btn" onclick="addEvent()">+ Agregar</button>
      </div>
      <ul class="event-list" id="eventList"></ul>
    </section>

    <!-- CHECKLIST DIARIO -->
    <section class="card checklist-card">
      <h2 class="card-title">✔ Checklist diario</h2>
      <ul class="checklist" id="checklist"></ul>
    </section>

    <!-- AGUA Y GASTOS ROW -->
    <div class="two-col">

      <!-- AGUA -->
      <section class="card water-card">
        <h2 class="card-title">💧 Agua</h2>
        <div class="water-display">
          <div class="water-total" id="waterTotal">0 / 2000 ml</div>
          <div class="water-pct" id="waterPct">0%</div>
          <div class="water-bar-wrap">
            <div class="water-bar" id="waterBar"></div>
          </div>
          <div class="water-goal" id="waterGoalMsg">Meta: 2000 ml</div>
        </div>
        <button class="btn btn-green full-btn" onclick="addWater()">+250 ml</button>
        <button class="btn btn-ghost full-btn" onclick="resetWater()">Reiniciar</button>
      </section>

      <!-- GASTOS -->
      <section class="card expenses-card">
        <h2 class="card-title">💰 Gastos</h2>
        <div class="expense-form">
          <input type="number" id="expenseAmount" class="input" placeholder="Monto $" min="0" />
          <select id="expenseCategory" class="input">
            <option value="Comida">🍔 Comida</option>
            <option value="Transporte">🚗 Transporte</option>
            <option value="Salud">💊 Salud</option>
            <option value="Ocio">🎮 Ocio</option>
            <option value="Otro">📦 Otro</option>
          </select>
          <button class="btn btn-green" onclick="addExpense()">+</button>
        </div>
        <div class="expense-total">Total: $<span id="expenseTotal">0</span></div>
        <ul class="expense-list" id="expenseList"></ul>
      </section>

    </div>

    <!-- DISCIPLINA / ESTADO ÁGUILA -->
    <section class="card discipline-card">
      <h2 class="card-title">🦅 Nivel Águila</h2>
      <div class="eagle-progress">
        <div class="eagle-big-state" id="eagleBigState">🥚</div>
        <div class="eagle-info">
          <div class="eagle-big-label" id="eagleBigLabel">Inicio</div>
          <div class="eagle-sub">Completa tu checklist para evolucionar</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <div class="progress-text" id="progressText">0 / 0 tareas</div>
        </div>
      </div>
    </section>

  </main>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
