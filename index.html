<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header>
<button id="prevDay">◀</button>
<h1 id="fecha"></h1>
<button id="nextDay">▶</button>
</header>

<section class="card">
<h2>Agenda</h2>
<div id="timeline"></div>

<input type="time" id="hora">
<input type="text" id="eventoTexto" placeholder="Evento">
<button id="addEvento">Agregar</button>
</section>

<section class="card">
<h2>Pendientes</h2>
<div id="pendientes"></div>

<input type="text" id="nuevoPendiente" placeholder="Nuevo pendiente">
<button id="addPendiente">Agregar</button>
</section>

<section class="card">
<h2>Disciplina</h2>
<label><input type="checkbox" id="respiracion"> Respiración</label>
<label><input type="checkbox" id="calistenia"> Calistenia</label>
<label><input type="checkbox" id="baño"> Baño caliente</label>
</section>

<section class="card">
<h2>Agua</h2>
<div id="agua">0 ml</div>
<button id="addAgua">+250 ml</button>
</section>

<section class="card">
<h2>Progreso</h2>
<div class="progress">
<div id="progressBar"></div>
</div>
<p id="porcentaje">0%</p>
</section>

<section class="card">
<h2>Misión Activa</h2>
<div id="mision"></div>
<button id="completeMission">Completar</button>
</section>

<section class="card">
<h2>Calendario</h2>
<div id="calendar"></div>
</section>

<section class="card">
<h2>Progreso 7 días</h2>
<canvas id="grafica" width="300" height="150"></canvas>
</section>

<section class="card">
<h2>Estudio Biblico</h2>
<p id="pasaje"></p>
<textarea id="reflexion" placeholder="Reflexión"></textarea>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
