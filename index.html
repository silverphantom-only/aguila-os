<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>

<body>

<h1>🦅 Águila OS</h1>

<div class="section">
<h2>📍 Hoy</h2>
<div id="hoyBox"></div>
</div>

<div class="section">
<h2>📊 Estado</h2>
<img id="estadoImg" src="img/balgham.png">
<p id="estadoDia"></p>
</div>

<div class="section">
<button onclick="abrirMusica()">🎧 Música</button>
<button onclick="iniciarEntreno()">🔥 Entrenar</button>
<p id="fase"></p>
<div id="timer"></div>
</div>

<div class="section">
<h2>📅 Semana</h2>
<textarea data-key="domingo" placeholder="Domingo"></textarea>
<textarea data-key="lunes" placeholder="Lunes"></textarea>
<textarea data-key="martes" placeholder="Martes"></textarea>
<textarea data-key="miercoles" placeholder="Miércoles"></textarea>
<textarea data-key="jueves" placeholder="Jueves"></textarea>
<textarea data-key="viernes" placeholder="Viernes"></textarea>
<textarea data-key="sabado" placeholder="Sábado"></textarea>
</div>

<div class="section">
<h2>📖 Diario</h2>
<textarea data-key="diario" placeholder="Escribe tu día..."></textarea>
</div>

<div class="section">
<h2>💰 Gastos</h2>
<input id="monto" placeholder="Monto">
<input id="categoria" placeholder="Categoría">
<button onclick="addGasto()">Agregar</button>
<ul id="gastos"></ul>
<p>Total: $<span id="total"></span></p>
</div>

<div class="section">
<button onclick="resetAll()">RESET</button>
</div>

<script src="app.js"></script>
</body>
</html>
