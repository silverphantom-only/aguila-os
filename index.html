<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🦅 Águila OS</h1>

<input type="date" id="fecha">

<!-- PROGRESO -->
<div class="progress">
  <div id="barra"></div>
</div>
<p id="porcentaje">0%</p>

<!-- CHECKLIST TRABAJO -->
<section>
  <h2>🧠 Trabajo Diario</h2>
  <div id="checksTrabajo"></div>
</section>

<!-- HÁBITOS -->
<section>
  <h2>💪 Disciplina Física</h2>
  <div id="habitos"></div>
</section>

<!-- VIDA -->
<section>
  <h2>❤️ Vida</h2>
  <div id="vida"></div>
</section>

<!-- NOTAS -->
<section>
  <h2>📖 Bitácora</h2>
  <input id="biblia" placeholder="Pasaje bíblico">
  <textarea id="nota" placeholder="Nota del día"></textarea>
  <button onclick="guardarNotas()">Guardar</button>
</section>

<script src="app.js"></script>
</body>
</html>
