<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Águila OS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <h1>🦅 Águila OS</h1>

  <!-- Fecha -->
  <input type="date" id="fecha">

  <!-- Progreso -->
  <div class="progreso-container">
    <div id="barra"></div>
  </div>
  <p id="porcentaje">0%</p>

  <!-- EVENTOS -->
  <section>
    <h2>📅 Eventos</h2>
    <input type="time" id="horaEvento">
    <input type="text" id="textoEvento" placeholder="Evento...">
    <button onclick="agregarEvento()">Agregar</button>
    <ul id="listaEventos"></ul>
  </section>

  <!-- CHECKLIST -->
  <section>
    <h2>🧠 Checklist</h2>
    <div id="checklist"></div>
  </section>

  <!-- PENDIENTES -->
  <section>
    <h2>📌 Pendientes</h2>
    <input type="text" id="inputPendiente" placeholder="Nuevo pendiente...">
    <button onclick="agregarPendiente()">Agregar</button>
    <ul id="listaPendientes"></ul>
  </section>

  <!-- AGUA -->
  <section>
    <h2>💧 Agua</h2>
    <p id="aguaTotal">0 ml</p>
    <button onclick="sumarAgua()">+250 ml</button>
  </section>

  <!-- BIBLIA -->
  <section>
    <h2>📖 Estudio Bíblico</h2>
    <input type="text" id="pasaje" placeholder="Pasaje">
    <textarea id="nota" placeholder="Nota..."></textarea>
    <button onclick="guardarBiblia()">Guardar</button>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
