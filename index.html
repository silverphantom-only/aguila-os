<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aguila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🦅 Aguila OS</h1>

<div class="card">
  <h2>📆 Semana</h2>
  <div id="semana"></div>
</div>

<div class="card">
  <h2>📍 Día</h2>
  <p id="fechaTexto"></p>
  <div id="listaEventos"></div>
</div>

<div class="card">
  <h2>➕ Nuevo Evento</h2>
  <input type="date" id="fecha">
  <input type="time" id="hora">
  <input type="text" id="texto" placeholder="Ej: Dentista">
  <button onclick="agregarEvento()">Agregar</button>
</div>

<div class="card">
  <h2>✔ Checklist Diario</h2>

  <label><span>Respiración</span><input type="checkbox" data-id="resp"></label>
  <label><span>Entrenamiento</span><input type="checkbox" data-id="entreno"></label>
  <label><span>Desayuno</span><input type="checkbox" data-id="des"></label>

</div>

<div class="card">
  <h2>🔥 Disciplina</h2>
  <p>Racha: <span id="streak">0</span></p>
</div>

<div class="card">
  <h2>🦅 Estado</h2>
  <p id="estadoTexto"></p>
</div>

<div class="card">
  <h2>💧 Agua</h2>
  <p id="agua">0 ml</p>
  <button onclick="sumarAgua()">+250 ml</button>
</div>

<div class="card">
  <h2>💰 Gastos</h2>
  <input id="monto" placeholder="Monto">
  <input id="categoria" placeholder="Categoría">
  <button onclick="agregarGasto()">Agregar</button>

  <ul id="listaGastos"></ul>
  <p>Total: $<span id="total">0</span></p>
</div>

<script src="app.js"></script>

</body>
</html>
