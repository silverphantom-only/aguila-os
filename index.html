<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* CARDS */
.card {
  background: #111a2b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* INPUTS */
input, textarea, button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* LISTAS */
ul {
  padding: 0;
  list-style: none;
}

li {
  background: #0f172a;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* CHECK */
.check {
  margin-right: 10px;
}

/* PROGRESO */
.progress-container {
  background: #1e293b;
  border-radius: 10px;
  height: 20px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: 0.3s;
}
</style>

</head>

<body>

<div class="container">

<h1>🦅 Águila OS</h1>

<!-- 📅 FECHA -->
<div class="card">
  <h2>📅 Día activo</h2>
  <input type="date" id="fecha">
</div>

<!-- 📊 PROGRESO -->
<div class="card">
  <h2>📊 Progreso del día</h2>
  <div class="progress-container">
    <div class="progress-bar" id="progreso"></div>
  </div>
  <p id="porcentaje">0%</p>
</div>

<!-- 📌 EVENTOS -->
<div class="card">
  <h2>📌 Eventos</h2>

  <input type="time" id="hora">
  <input type="text" id="evento" placeholder="Descripción del evento">

  <button onclick="agregarEvento()">Agregar</button>

  <ul id="listaEventos"></ul>
</div>

<!-- 🧠 TRABAJO DIARIO -->
<div class="card">
  <h2>🧠 Trabajo Diario</h2>

  <label><input type="checkbox" class="check" onchange="toggleCheck('trabajo1')"> Actividades laborales</label><br>
  <label><input type="checkbox" class="check" onchange="toggleCheck('trabajo2')"> Organización</label><br>
  <label><input type="checkbox" class="check" onchange="toggleCheck('trabajo3')"> Cierre</label>
</div>

<!-- 📌 PENDIENTES -->
<div class="card">
  <h2>📌 Pendientes</h2>

  <input type="text" id="pendiente" placeholder="Nuevo pendiente">
  <button onclick="agregarPendiente()">Agregar</button>

  <ul id="listaPendientes"></ul>
</div>

<!-- 💧 AGUA -->
<div class="card">
  <h2>💧 Agua</h2>

  <p id="aguaTotal">0 ml</p>

  <button onclick="sumarAgua()">+250 ml</button>
</div>

<!-- 📖 ESTUDIO BÍBLICO -->
<div class="card">
  <h2>📖 Estudio Bíblico</h2>

  <input type="text" id="pasaje" placeholder="Pasaje (ej: Juan 3)">
  <textarea id="nota" placeholder="Reflexión"></textarea>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
