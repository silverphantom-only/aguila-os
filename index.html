<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🦅 Águila OS</h1>
  <input type="date" id="fecha">
  <div id="estado"></div>
  <div class="progress"><div id="barra"></div></div>
  <h3 id="porcentaje"></h3>
</header>

<div id="calendarBar"></div>

<section class="card">
  <h2>📅 Agenda del Día</h2>
  <ul id="agendaDia"></ul>
</section>

<section class="card">
  <h2>➕ Agendar Pendiente</h2>
  <input id="pendienteTexto" placeholder="Ej: Llamar cliente">
  <input type="date" id="pendienteFecha">
  <button onclick="addPendiente()">Guardar</button>
</section>

<section class="card">
  <h2>📌 Pendientes del día</h2>
  <ul id="listaPendientes"></ul>
</section>

<section class="card">
  <h2>🧠 Trabajo</h2>
  <div id="checks"></div>
</section>

<section class="card">
  <h2>💧 Agua</h2>
  <p id="agua"></p>
  <button onclick="sumarAgua()">+250 ml</button>
</section>

<section class="card">
  <h2>🧠 Disciplina</h2>
  <label><input type="checkbox" onchange="toggleDisc('resp')"> Respiración (diario)</label>
  <label><input type="checkbox" onchange="toggleDisc('calistenia')"> Calistenia</label>
  <label><input type="checkbox" onchange="toggleDisc('baño')"> Baño caliente</label>
</section>

<section class="card">
  <h2>📖 Estudio Bíblico</h2>
  <p id="versiculo"></p>
  <textarea id="notaBiblia" placeholder="Reflexión..."></textarea>
</section>

<script src="app.js"></script>
</body>
</html>
