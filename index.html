<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Águila OS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <button onclick="go('inicio')">🏠</button>
  <button onclick="go('dia')">📅</button>
  <button onclick="go('agenda')">🗓️</button>
  <button onclick="go('biblia')">📖</button>
  <button onclick="go('disciplina')">🧠</button>
</nav>

<div id="app">

<!-- INICIO -->
<section id="inicio" class="view active">
  <h1>🦅 Águila OS</h1>
  <div id="estado"></div>
  <div class="progress"><div id="barra"></div></div>
  <h2 id="porcentaje"></h2>
</section>

<!-- DIA -->
<section id="dia" class="view">

<input type="date" id="fecha">

<h3>📌 Agenda</h3>
<input id="hora" type="time">
<input id="eventoTexto" placeholder="Evento">
<button onclick="addEvento()">Agregar</button>
<ul id="listaEventos"></ul>

<h3>📋 Pendientes</h3>
<input id="pendienteTexto">
<button onclick="addPendiente()">Agregar</button>
<ul id="listaPendientes"></ul>

<h3>🧠 Trabajo</h3>
<div id="checks"></div>

</section>

<!-- AGENDA -->
<section id="agenda" class="view">
  <h3>🗓️ Calendario</h3>
  <div id="calendar"></div>
</section>

<!-- BIBLIA -->
<section id="biblia" class="view">
  <input id="pasaje" placeholder="Pasaje">
  <textarea id="obs" placeholder="Observación"></textarea>
  <textarea id="interp" placeholder="Interpretación"></textarea>
  <textarea id="aplic" placeholder="Aplicación"></textarea>
</section>

<!-- DISCIPLINA -->
<section id="disciplina" class="view">
  <button onclick="sumarAgua()">💧 +250ml</button>
  <p id="agua"></p>

  <label><input type="checkbox" onchange="toggleDisc('resp')"> Respiración</label>
  <label><input type="checkbox" onchange="toggleDisc('ejercicio')"> Ejercicio</label>
  <label><input type="checkbox" onchange="toggleDisc('pastilla')"> Pastilla</label>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
